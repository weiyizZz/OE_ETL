        nullable: true
        example_value: '{"Dutch language level": "A2"}'
        description: >-
          Extra information from the source transcript not covered by
          other fields. Stored as a JSONB object with field names as
          keys and their corresponding values


  questions:
    description: "Questions asked to participants"
    columns:

      questionID:
        type: INTEGER
        primary_key: true
        nullable: false
        example_value: 45
        description: "Integer ID, assigned sequentially increasing for each row"

      question_content:
        type: Text
        nullable: false
        example_value: "Do you do any paid work or volunteer work?"
        description: "The exact question posed to participants, or the subtheme/topic if no explicit question is present"

      main_indicator:
        type: Text
        nullable: true
        example_values: ['work', 'education', 'housing', 'health', 'leisure', 'bonds', 'bridges', 'links', 'language', 'culture', 'digital skills', 'safety', 'stability', 'rights and responsibilities', 'werk & inkomen', 'onderwijs', 'huisvesting & opvang', 'zorg & welzijn', 'vrije tijd', 'banden', 'bruggen', 'connecties', 'taal', 'cultuur', 'digitale vaardigheden', 'veiligheid', 'stabilitieit', 'rechten & verantwoordelijkheden']
        description: "The main indicator that this question can be classified into"

      followed_questionID:
        type: Text
        nullable: true
        foreign_key:
          references_table: oral_questions
          references_column: questionID
          on_delete: RESTRICT
        example:
          independent_question:
            questionID: "00134689"
            question_content: "Do you do any paid work or volunteer work?"
            followed_questionID: null
            following_trigger: null
          following_question:
            questionID: "00134690"
            question_content: "How did you get this work?"
            followed_questionID: "00134689"
            following_trigger: "yes"
        description: >-
          The questionID of the parent question that this question
          follows up on. For example, "How did you get this work?"
          (00134690) follows "Do you do any paid work?" (00134689)
          when the participant answered "yes". Empty if this is an
          independent question

      following_trigger:
        type: Text
        nullable: true
        example:
          independent_question:
            questionID: "00134689"
            question_content: "Do you do any paid work or volunteer work?"
            followed_questionID: null
            following_trigger: null
          following_question:
            questionID: "00134690"
            question_content: "How did you get this work?"
            followed_questionID: "00134689"
            following_trigger: "yes"
        description: >-
          The answer to the parent question that triggers this
          follow-up question. For example, a participant answering
          "yes" to "Do you do any paid work?" triggers the follow-up
          "How did you get this work?". Empty if this is an
          independent question


  answers:
    description: "Participant responses to questions, linked to projects"
    columns:

      answerID:
        type: INTEGER
        primary_key: true
        nullable: false
        example_value: 6789
        description: "Integer ID, assigned sequentially increasing for each row"

      questionID:
        type: INTEGER
        nullable: false
        foreign_key:
          references_table: questions
          references_column: questionID
        example_value: "45"
        description: "The questionID of the question this answer responds to"

      participantID:
        type: INTEGER
        nullable: true
        foreign_key:
          references_table: participants
          references_column: participantID
        example_value: "123"
        description: "The participantID of the participant who gave this answer"

      answer_content_oriLAN:
        type: Text
        nullable: false
        example_value: "Su anda calismiyorum ama daha once Jumbo da 1 ay ucretli olarak calistim."
        description: "The original content of the answer in its original language"

      answer_content_EN:
        type: Text
        nullable: true
        example_value: "I m not currently employed, but I previously worked at Jumbo for a month on a paid basis."
        description: "The English translation of the answer, if it wasn't in English"

  1recordT:
    description: "Information that can be transformed from the orginal text with only 1 record. Will be merged into the other tables eventually when loading into the database."

    columns:
      date:
        type: Date
        nullable: true
        example_value: "2025-12-03"
        description: "The date of the session in which the answers were given"

      data_source_category:
        type: Text
        nullable: true
        example_values: ["expertpool", "survey", "focus group", "diepteinterview"]
        description: "The category that the data source belongs to"

# ── Relationships ──────────────────────────────────────────────────────────────

relationships:

  - from_table: answers
    from_column: participantID
    to_table: participants
    to_column: participantID
    type: many_to_one
    description: "Each answer belongs to one participant"

  - from_table: answers
    from_column: questionID
    to_table: questions
    to_column: questionID
    type: many_to_one
    description: "Each answer corresponds to one question"

  - from_table: questions
    from_column: followed_questionID
    to_table: questions
    to_column: questionID
    type: many_to_one
    description: "A follow-up question references its parent question"