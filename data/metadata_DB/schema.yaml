# Database Schema Metadata for the first extraction
# Tables: participants, oral_questions, oral_answers
# Last updated: 2026-04-29

tables:

  participants:
    description: "participant information records"
    columns:

      participantID:
        type: INTEGER
        primary_key: true
        nullable: false
        example_value: 123
        description: "Integer ID, assigned sequentially increasing for each row"

      initials:
        type: Text
        nullable: true
        example_value: "A.B."
        description: "Name initials of the participant"

      gender:
        type: Text
        nullable: true
        example_values: ["Male", "Female", "Man", "Woman", "Non-binary", "Unknown", "Vrouw"]
        description: "Gender of the participant"

      age:
        type: INTEGER
        nullable: true
        example_value: 33
        description: "Age of the participant at the time of the project"

      learning_route:
        type: Text
        nullable: true
        example_values: ["O-route", "Onderwijsroute", "B1-route", "Z-route", "Unknown", "Unknown yet"]
        description: >-
          The learning pathway of the participant. Three options:
          education pathway (O-route), B1-route, or self-reliance
          pathway (Z-route)

      participant_group:
        type: Text
        nullable: true
        example_values: ["Asylum seeker", "Labor migrant", "Permit holder", "Family migrant", "Undocumented", "Ukranian displaced"]
        description: "The group that the participant belongs to"

      status:
        type: Text
        nullable: true
        example_values: ["A", "B", ""]
        description: "The status subject to participant_group"

      place_of_origin:
        type: Text
        nullable: true
        example_value: "Turkey"
        description: "The country that the participant comes from"

      language_group:
        type: JSONB
        json_schema_type: "array"
        nullable: true
        example_value: '["Turkish", "Arabic"]'
        description: "The list of languages that the participant acquires"

      first_arrival_date:
        type: Date
        nullable: true
        example_value: "2013-01-01"
        description: "The approximate date the participant first arrived in the country they currently stay in. If only year is known, use 01 as placeholder for both month and day (YYYY-01-01). If month is known, use the actual month (YYYY-MM-01)."

      municipality:
        type: Text
        nullable: true
        example_values: ["Amsterdam", "Rotterdam", "Den Haag", "Utrecht", "Groningen"]
        #example_values: ["Aa en Hunze", "Aalsmeer", "Aalten", "Achtkarspelen", "Alblasserdam", "Albrandswaard", "Alkmaar", "Almelo", "Almere", "Alphen aan den Rijn", "Alphen-Chaam", "Altena", "Ameland", "Amersfoort", "Amstelveen", "Amsterdam", "Apeldoorn", "Arnhem", "Assen", "Asten", "Baarle-Nassau", "Baarn", "Barendrecht", "Barneveld", "Beek", "Beekdaelen", "Beesel", "Berg en Dal", "Bergeijk", "Bergen (L)", "Bergen (NH)", "Bergen op Zoom", "Berkelland", "Bernheze", "Best", "Beuningen", "Beverwijk", "Bladel", "Blaricum", "Bloemendaal", "Bodegraven-Reeuwijk", "Boekel", "Borger-Odoorn", "Borne", "Borsele", "Boxtel", "Breda", "Bronckhorst", "Brummen", "Brunssum", "Bunnik", "Bunschoten", "Buren", "Capelle aan den IJssel", "Castricum", "Coevorden", "Cranendonck", "Culemborg", "Dalfsen", "Dantumadiel", "De Bilt", "De Fryske Marren", "De Ronde Venen", "De Wolden", "Delft", "Den Haag", "Den Helder", "Deurne", "Deventer", "Diemen", "Dijk en Waard", "Dinkelland", "Doesburg", "Doetinchem", "Dongen", "Dordrecht", "Drechterland", "Drimmelen", "Dronten", "Druten", "Duiven", "Echt-Susteren", "Edam-Volendam", "Ede", "Eemnes", "Eemsdelta", "Eersel", "Eijsden-Margraten", "Eindhoven", "Elburg", "Emmen", "Enkhuizen", "Enschede", "Epe", "Ermelo", "Etten-Leur", "Geertruidenberg", "Geldrop-Mierlo", "Gemert-Bakel", "Gennep", "Gilze en Rijen", "Goeree-Overflakkee", "Goes", "Goirle", "Gooise Meren", "Gorinchem", "Gouda", "Groningen", "Gulpen-Wittem", "Haaksbergen", "Haarlem", "Haarlemmermeer", "Halderberge", "Hardenberg", "Harderwijk", "Hardinxveld-Giessendam", "Harlingen", "Hattem", "Heemskerk", "Heemstede", "Heerde", "Heerenveen", "Heerlen", "Heeze-Leende", "Heiloo", "Hellendoorn", "Helmond", "Hendrik-Ido-Ambacht", "Hengelo", "'s-Hertogenbosch", "Het Hogeland", "Heumen", "Heusden", "Hillegom", "Hilvarenbeek", "Hilversum", "Hoeksche Waard", "Hof van Twente", "Hollands Kroon", "Hoogeveen", "Hoorn", "Horst aan de Maas", "Houten", "Huizen", "Hulst", "IJsselstein", "Kaag en Braassem", "Kampen"